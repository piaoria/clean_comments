<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>clean_comments</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="popup">
      <header>
        <div>
          <h1>clean_comments</h1>
          <p>YouTube comment filter</p>
        </div>
      </header>

      <nav class="tabs" aria-label="Settings sections">
        <button type="button" class="tab-button" data-tab="general" aria-selected="true">General</button>
        <button type="button" class="tab-button" data-tab="labels" aria-selected="false">Labels</button>
        <button type="button" class="tab-button" data-tab="words" aria-selected="false">Words</button>
        <button type="button" class="tab-button" data-tab="status" aria-selected="false">Status</button>
      </nav>

      <section class="tab-panel" data-panel="general">
        <section class="panel">
          <h2>Default filtered style</h2>
          <div class="segmented" role="radiogroup" aria-label="Default filtered comment style">
            <label>
              <input type="radio" name="moderationMode" value="blur">
              <span>Blur</span>
            </label>
            <label>
              <input type="radio" name="moderationMode" value="blind">
              <span>Blind</span>
            </label>
            <label>
              <input type="radio" name="moderationMode" value="dim">
              <span>Dim</span>
            </label>
          </div>
        </section>

        <label class="setting">
          <span>
            <strong>Debug badge</strong>
            <small>Show label, source, confidence, and reason</small>
          </span>
          <input id="showDebugBadges" type="checkbox" role="switch">
        </label>
      </section>

      <section class="tab-panel" data-panel="labels" hidden>
        <section class="panel">
          <h2>Label behavior</h2>
          <div class="label-list" id="labelSettings"></div>
        </section>
      </section>

      <section class="tab-panel" data-panel="words" hidden>
        <section class="panel">
          <label class="textarea-label" for="customFilterWords">
            <strong>Custom words</strong>
            <small>One word or phrase per line</small>
          </label>
          <div class="template-row" aria-label="Suggested word templates">
            <button type="button" class="template-button" data-template="harassment">Harassment</button>
            <button type="button" class="template-button" data-template="spam">Spam bait</button>
            <button type="button" class="template-button" data-template="adult">Adult bait</button>
          </div>
          <textarea id="customFilterWords" rows="7" spellcheck="false" placeholder="bad word&#10;spam phrase"></textarea>
          <p class="hint" id="customWordsHint">0 saved</p>
        </section>
      </section>

      <section class="tab-panel" data-panel="status" hidden>
        <section class="status" aria-live="polite">
          <h2>Status</h2>
          <dl>
            <div>
              <dt>AI</dt>
              <dd id="aiStatus">Not checked</dd>
            </div>
            <div>
              <dt>Classified</dt>
              <dd id="classificationStatus">0</dd>
            </div>
            <div>
              <dt>Fallback</dt>
              <dd id="fallbackStatus">0</dd>
            </div>
            <div>
              <dt>Custom</dt>
              <dd id="customStatus">0</dd>
            </div>
            <div>
              <dt>Last</dt>
              <dd id="lastStatus">None</dd>
            </div>
          </dl>
        </section>
      </section>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
