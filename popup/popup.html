<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>clean_comments</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="popup">
      <header>
        <h1>clean_comments</h1>
        <p>YouTube comment filter</p>
      </header>

      <section class="panel">
        <h2>Filtered comment style</h2>
        <div class="segmented" role="radiogroup" aria-label="Filtered comment style">
          <label>
            <input type="radio" name="moderationMode" value="blur">
            <span>Blur</span>
          </label>
          <label>
            <input type="radio" name="moderationMode" value="blind">
            <span>Blind</span>
          </label>
          <label>
            <input type="radio" name="moderationMode" value="dim">
            <span>Dim</span>
          </label>
        </div>
      </section>

      <label class="setting">
        <span>
          <strong>Debug badge</strong>
          <small>Show label, source, confidence, and reason</small>
        </span>
        <input id="showDebugBadges" type="checkbox" role="switch">
      </label>

      <section class="status" aria-live="polite">
        <h2>Status</h2>
        <dl>
          <div>
            <dt>AI</dt>
            <dd id="aiStatus">Not checked</dd>
          </div>
          <div>
            <dt>Classified</dt>
            <dd id="classificationStatus">0</dd>
          </div>
          <div>
            <dt>Fallback</dt>
            <dd id="fallbackStatus">0</dd>
          </div>
          <div>
            <dt>Last</dt>
            <dd id="lastStatus">None</dd>
          </div>
        </dl>
      </section>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
